name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Asegúrate de que tu rama se llame main, si es master cámbialo aquí

jobs:
  deploy-to-github-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: dotnet publish BlazorPWA.csproj -c Release -o release --nologo

      - name: Fix base-tag for GitHub Pages
        run: sed -i 's/<base href="\/" \/>/<base href="\/LastDrop\/" \/>/g' release/wwwroot/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: release/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
